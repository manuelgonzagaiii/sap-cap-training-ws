type: marketplace
title: "SAP CAP — Guided Project (AssetCare: Asset & Maintenance Management)"
language: English
summary: |-
  A hands-on, guided project that takes you from the very basics of the SAP Cloud
  Application Programming Model (CAP) to its most advanced and rarely-used features.
  You build one real SAP-style business application — AssetCare, an asset and
  maintenance management app (equipment, work orders, technicians, spare parts,
  inspections) — growing it lesson by lesson on the Node.js stack.

  Two parallel tracks are provided: JavaScript and TypeScript. Everything runs on
  free, open-source tooling a trainee can run locally — CAP with SQLite for the fast
  inner loop and PostgreSQL as the deploy target. No S/4HANA and no paid SAP BTP
  satellite systems are required; where a real app would use one, the course uses a
  free local stand-in.

  Prerequisites: solid JavaScript and (for the TS track) TypeScript. These languages
  are NOT taught here.
