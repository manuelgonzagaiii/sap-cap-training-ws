summary: |-
  A hands-on, guided project that builds one real SAP back end — Crew Timesheet —
  with SAP CAP on Node.js, from first principles to advanced features: CDS
  modelling, custom logic, drafts, PostgreSQL, external-service integration, the
  transactional outbox, MTA packaging, UI5 Tooling and testing. Everything runs
  locally with free tooling; no SAP BTP, S/4HANA or paid systems are required.

  Prerequisites: solid JavaScript. JavaScript is NOT taught here — this course
  teaches SAP CAP.
